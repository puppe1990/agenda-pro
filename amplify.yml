version: 1
applications:
  - appRoot: apps/app
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm use 22
            - corepack enable
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm --filter @agenda-pro/app db:push
            - pnpm --filter @agenda-pro/app build
      artifacts:
        baseDirectory: apps/app/.amplify-hosting
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
