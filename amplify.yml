version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 22
        - corepack enable
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm db:push
        - pnpm build
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
