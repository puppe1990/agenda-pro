version: 1
applications:
  - appRoot: apps/app
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm use 22
            - corepack enable
            - pnpm install --frozen-lockfile
        build:
          commands:
            - rm -f apps/app/.env.production
            - env | grep -e '^TURSO_DATABASE_URL=' >> apps/app/.env.production
            - env | grep -e '^TURSO_AUTH_TOKEN=' >> apps/app/.env.production
            - env | grep -e '^BETTER_AUTH_SECRET=' >> apps/app/.env.production
            - env | grep -e '^BETTER_AUTH_URL=' >> apps/app/.env.production
            - env | grep -e '^CRON_SECRET=' >> apps/app/.env.production
            - pnpm --filter @agenda-pro/app db:push
            - pnpm --filter @agenda-pro/app build
            - mkdir -p apps/app/.amplify-hosting/compute/default/node_modules
            - cp -RL apps/app/node_modules/@better-auth apps/app/.amplify-hosting/compute/default/node_modules/
            - cp -RL apps/app/node_modules/kysely apps/app/.amplify-hosting/compute/default/node_modules/
      artifacts:
        baseDirectory: apps/app/.amplify-hosting
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
