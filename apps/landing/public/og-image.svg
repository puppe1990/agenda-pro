<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff8f6"/>
      <stop offset="45%" stop-color="#ffe8e3"/>
      <stop offset="100%" stop-color="#ffd4cc"/>
    </linearGradient>
    <radialGradient id="glow-a" cx="1" cy="0" r="0.7">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-b" cx="0" cy="1" r="0.6">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#501820" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-a)"/>
  <rect width="1200" height="630" fill="url(#glow-b)"/>

  <rect x="72" y="72" width="1056" height="486" rx="36" fill="#ffffff" fill-opacity="0.82" stroke="#f0d4cf" stroke-width="2"/>

  <g transform="translate(120 150)">
    <rect x="0" y="0" width="88" height="88" rx="22" fill="#be123c"/>
    <text x="44" y="58" text-anchor="middle" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">GB</text>

    <text x="112" y="38" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#2b1818">Gestão Bem</text>
    <text x="112" y="72" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="20" font-weight="600" fill="#be123c">Para salões, clínicas e consultórios</text>
  </g>

  <text x="120" y="320" font-family="Fraunces, Georgia, serif" font-size="64" font-weight="700" fill="#2b1818">
    <tspan x="120" dy="0">Agenda, clientes e</tspan>
    <tspan x="120" dy="78">financeiro em um só lugar.</tspan>
  </text>

  <text x="120" y="470" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="28" font-weight="500" fill="#6b4f4f">
    <tspan x="120" dy="0">Agendamento online, CRM e relatórios para o seu negócio crescer.</tspan>
  </text>

  <g transform="translate(860 420)" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="64" rx="18" fill="#be123c"/>
    <text x="110" y="42" text-anchor="middle" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Começar grátis</text>
  </g>
</svg>